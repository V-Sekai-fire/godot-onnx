[package]
name = "godot-onnx"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
godot = { git = "https://github.com/godot-rust/gdext.git", features = ["experimental-threads", "register-docs"] }
ort = { version = "2.0.0-rc.11", features = ["ndarray"] }
ndarray = "0.17"

# macOS: add CoreML execution provider
[target.'cfg(target_os = "macos")'.dependencies]
ort = { version = "2.0.0-rc.11", features = ["ndarray", "coreml"] }

# iOS: CoreML only (no WebGPU/Dawn to avoid linking webgpu_dawn)
[target.'cfg(target_os = "ios")'.dependencies]
ort = { version = "2.0.0-rc.11", features = ["ndarray", "coreml"] }

# Android: CPU only (no WebGPU/Dawn prebuilts on pyke CDN; use build-dawn job to build Dawn if needed)
[target.'cfg(target_os = "android")'.dependencies]
ort = { version = "2.0.0-rc.11", features = ["ndarray", "nnapi"] }

# Web (wasm32): godot single-threaded (experimental-wasm-nothreads) to avoid Sync in godot-ffi; ort-web backend
[target.'cfg(target_arch = "wasm32")'.dependencies]
godot = { git = "https://github.com/godot-rust/gdext.git", default-features = false, features = ["api-custom", "experimental-wasm-nothreads", "lazy-function-tables"] }
ort = { version = "2.0.0-rc.11", default-features = false, features = ["ndarray", "alternative-backend"] }
ort-web = "0.1"
wasm-bindgen-futures = "0.4"

[features]
default = ["godot/api-4-5"]
# Build for Godot compiled with precision=double. Requires GODOT4_BIN pointing to that binary. Use: cargo build --release --no-default-features --features double-precision
double-precision = ["godot/api-custom", "godot/double-precision"]

[dev-dependencies]
proptest = "1.5"
