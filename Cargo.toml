[package]
name = "godot-onnx"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
godot = { git = "https://github.com/godot-rust/gdext.git", features = ["experimental-threads", "register-docs"] }
# Default: CPU only (no webgpu; Linux/Windows add webgpu via target-specific deps)
ort = { version = "2.0.0-rc.11", features = ["ndarray"] }
ndarray = "0.17"

# Linux/Windows: WebGPU for GPU
[target.'cfg(any(target_os = "linux", target_os = "windows"))'.dependencies]
ort = { version = "2.0.0-rc.11", features = ["ndarray", "webgpu"] }

# macOS: CoreML for GPU (no WebGPU)
[target.'cfg(target_os = "macos")'.dependencies]
ort = { version = "2.0.0-rc.11", features = ["ndarray", "coreml"] }

# Android (incl. Meta Quest 3): NNAPI for GPU/NPU acceleration, CPU fallback
[target.'cfg(target_os = "android")'.dependencies]
ort = { version = "2.0.0-rc.11", features = ["ndarray", "nnapi"] }

# iOS: CoreML for GPU, same as macOS
[target.'cfg(target_os = "ios")'.dependencies]
ort = { version = "2.0.0-rc.11", features = ["ndarray", "coreml"] }

# Web (wasm32): use ort-web backend instead of native ONNX Runtime
[target.'cfg(target_arch = "wasm32")'.dependencies]
ort = { version = "2.0.0-rc.11", default-features = false, features = ["ndarray", "alternative-backend"] }
ort-web = "0.1"
wasm-bindgen-futures = "0.4"

[features]
default = ["godot/api-4-5"]
# Build for Godot compiled with precision=double. Requires GODOT4_BIN pointing to that binary. Use: cargo build --release --no-default-features --features double-precision
double-precision = ["godot/api-custom", "godot/double-precision"]

[dev-dependencies]
proptest = "1.5"
