name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}

env:
  DAWN_RELEASE_TAG: v20260219.200501
  DAWN_COMMIT: 536c572abab2602db0b652eda401ebd01e046c11

jobs:
  # --- Install Dawn for desktop Linux/Windows (ort WebGPU EP) ---
  dawn-linux:
    name: "Dawn: Linux"
    runs-on: ubuntu-latest
    steps:
      - name: Download Dawn (ubuntu-latest Release)
        run: |
          ASSET="Dawn-${{ env.DAWN_COMMIT }}-ubuntu-latest-Release.tar.gz"
          curl -sL -o dawn.tar.gz "https://github.com/google/dawn/releases/download/${{ env.DAWN_RELEASE_TAG }}/${ASSET}"
      - name: Install Dawn
        run: |
          mkdir -p dawn-install
          tar -xzf dawn.tar.gz -C dawn-install
          ls -laR dawn-install/
      - name: Cache Dawn
        uses: actions/cache/save@v4
        with:
          path: dawn-install
          key: dawn-linux-${{ env.DAWN_COMMIT }}

  dawn-windows:
    name: "Dawn: Windows"
    runs-on: windows-latest
    steps:
      - name: Download Dawn (windows-latest Release)
        run: |
          $asset = "Dawn-$env:DAWN_COMMIT-windows-latest-Release.tar.gz"
          Invoke-WebRequest -Uri "https://github.com/google/dawn/releases/download/$env:DAWN_RELEASE_TAG/$asset" -OutFile dawn.tar.gz -UseBasicParsing
      - name: Install Dawn
        run: |
          New-Item -ItemType Directory -Force -Path dawn-install | Out-Null
          tar -xzf dawn.tar.gz -C dawn-install
          Get-ChildItem dawn-install -Recurse | Select-Object -First 25
      - name: Cache Dawn
        uses: actions/cache/save@v4
        with:
          path: dawn-install
          key: dawn-windows-${{ env.DAWN_COMMIT }}
          enableCrossOsArchive: true

  # --- Desktop: test, build, per-OS artifact + merged artifact (Dawn only for Linux/Windows ort WebGPU) ---
  build-and-test:
    name: "Build: Desktop (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    needs: [dawn-linux, dawn-windows]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set Dawn cache key
        id: dawn
        if: matrix.os != 'macos-latest'
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            ubuntu-latest) echo "key=dawn-linux-${{ env.DAWN_COMMIT }}" >> $GITHUB_OUTPUT ;;
            windows-latest) echo "key=dawn-windows-${{ env.DAWN_COMMIT }}" >> $GITHUB_OUTPUT ;;
            *) echo "key=dawn-linux-${{ env.DAWN_COMMIT }}" >> $GITHUB_OUTPUT ;;
          esac

      - name: Restore Dawn
        if: matrix.os != 'macos-latest'
        uses: actions/cache/restore@v4
        with:
          path: dawn-install
          key: ${{ steps.dawn.outputs.key }}

      - name: Set Dawn env for ort
        if: matrix.os != 'macos-latest' && runner.os != 'Windows'
        run: |
          echo "DAWN_ROOT=${{ github.workspace }}/dawn-install" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=${{ github.workspace }}/dawn-install" >> $GITHUB_ENV

      - name: Set Dawn env for ort (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          echo "DAWN_ROOT=$env:GITHUB_WORKSPACE\dawn-install" >> $env:GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=$env:GITHUB_WORKSPACE\dawn-install" >> $env:GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate ONNX test models
        run: |
          pip install onnx
          cd sample/models
          python create_identity_onnx.py
          python create_matmul_onnx.py
        shell: bash

      - name: Install Janet
        run: |
          case "$RUNNER_OS" in
            Linux)
              git clone --depth 1 https://github.com/janet-lang/janet.git /tmp/janet
              (cd /tmp/janet && make -j2 && sudo make install)
              ;;
            macOS)
              brew install janet
              ;;
            Windows)
              pwsh -NoProfile -Command "if (!(Get-Command scoop -ErrorAction SilentlyContinue)) { Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser -Force; irm get.scoop.sh | iex }; scoop install janet"
              ;;
          esac
        shell: bash

      - name: Run tests, build, and put extension in sample
        run: |
          set -e
          if [ "$RUNNER_OS" = "Windows" ]; then
            JANET="$USERPROFILE/scoop/shims/janet.exe"
          else
            JANET=janet
          fi
          echo "Janet: $($JANET -v 2>/dev/null || true)"
          echo "Cargo: $(cargo -V)"
          $JANET misc/build.janet --ci
        shell: bash

      - name: Cache sample project (for merge)
        uses: actions/cache/save@v4
        with:
          path: sample
          key: sample-${{ matrix.os }}-${{ github.run_id }}
          enableCrossOsArchive: ${{ matrix.os != 'ubuntu-latest' }}

  merge-sample:
    name: "Merge: sample"
    runs-on: ubuntu-latest
    needs: [build-and-test, build-android, build-ios]
    if: always() && needs.build-and-test.result == 'success'
    steps:
      - name: Restore Linux build
        uses: actions/cache/restore@v4
        with:
          path: art-linux
          key: sample-ubuntu-latest-${{ github.run_id }}

      - name: Restore Windows build
        uses: actions/cache/restore@v4
        with:
          path: art-windows
          key: sample-windows-latest-${{ github.run_id }}
          enableCrossOsArchive: true

      - name: Restore macOS build
        uses: actions/cache/restore@v4
        with:
          path: art-macos
          key: sample-macos-latest-${{ github.run_id }}
          enableCrossOsArchive: true

      - name: Restore Android build
        if: needs.build-android.result == 'success'
        uses: actions/cache/restore@v4
        with:
          path: art-android
          key: sample-Android-${{ github.run_id }}

      - name: Restore iOS build
        if: needs.build-ios.result == 'success'
        uses: actions/cache/restore@v4
        with:
          path: art-ios
          key: sample-iOS-${{ github.run_id }}
          enableCrossOsArchive: true

      - name: Merge into one sample project
        run: |
          mkdir -p merged/sample/addons/godot-onnx
          cp -r art-linux/* merged/sample/
          cp art-windows/addons/godot-onnx/libgodot_onnx.dll merged/sample/addons/godot-onnx/ 2>/dev/null || true
          cp art-macos/addons/godot-onnx/libgodot_onnx.dylib merged/sample/addons/godot-onnx/ 2>/dev/null || true
          cp art-android/addons/godot-onnx/libgodot_onnx.arm64-v8a.so merged/sample/addons/godot-onnx/ 2>/dev/null || true
          cp art-ios/addons/godot-onnx/libgodot_onnx.ios.arm64.dylib merged/sample/addons/godot-onnx/ 2>/dev/null || true
          ls -la merged/sample/addons/godot-onnx/

      - name: Upload merged sample project
        uses: actions/upload-artifact@v4
        with:
          name: godot-onnx-sample
          path: merged/sample/
          if-no-files-found: error

  # --- Android / iOS (optional; continue-on-error if ort has no prebuilt for target) ---
  build-android:
    name: "Build: Android"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-linux-android
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
      - name: Build Android (arm64-v8a, Meta Quest)
        run: |
          NDK_BIN="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin"
          if [ -x "$NDK_BIN/aarch64-linux-android21-clang" ]; then
            export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$NDK_BIN/aarch64-linux-android21-clang"
          elif [ -x "$NDK_BIN/aarch64-linux-android26-clang" ]; then
            export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$NDK_BIN/aarch64-linux-android26-clang"
          fi
          cargo build --release --target aarch64-linux-android
      - name: Prepare and cache sample (for merge)
        run: |
          mkdir -p sample/addons/godot-onnx
          cp target/aarch64-linux-android/release/libgodot_onnx.so sample/addons/godot-onnx/libgodot_onnx.arm64-v8a.so 2>/dev/null || true
          ls -la sample/addons/godot-onnx/
      - name: Cache sample (for merge)
        if: success()
        uses: actions/cache/save@v4
        with:
          path: sample
          key: sample-Android-${{ github.run_id }}

  build-ios:
    name: "Build: iOS"
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-apple-ios
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - name: Build iOS (device arm64 only)
        run: cargo build --release --target aarch64-apple-ios
      - name: Prepare and cache sample (for merge)
        run: |
          mkdir -p sample/addons/godot-onnx
          cp target/aarch64-apple-ios/release/libgodot_onnx.dylib sample/addons/godot-onnx/libgodot_onnx.ios.arm64.dylib 2>/dev/null || true
          ls -la sample/addons/godot-onnx/
      - name: Cache sample (for merge)
        if: success()
        uses: actions/cache/save@v4
        with:
          path: sample
          key: sample-iOS-${{ github.run_id }}
          enableCrossOsArchive: true
