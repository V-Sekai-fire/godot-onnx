name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate ONNX test models
        run: |
          pip install onnx
          cd sample/models
          python create_identity_onnx.py
          python create_matmul_onnx.py
        shell: bash

      - name: Run tests
        run: cargo test

      - name: Build release
        run: cargo build --release

      - name: Put extension in sample project
        shell: bash
        run: |
          mkdir -p sample/addons/godot-onnx
          case "$RUNNER_OS" in
            Windows)
              if [ -f target/release/godot_onnx.dll ]; then cp target/release/godot_onnx.dll sample/addons/godot-onnx/libgodot_onnx.dll; fi
              if [ -f target/release/libgodot_onnx.dll ]; then cp target/release/libgodot_onnx.dll sample/addons/godot-onnx/libgodot_onnx.dll; fi
              ;;
            Linux)
              cp target/release/libgodot_onnx.so sample/addons/godot-onnx/ 2>/dev/null || true
              ;;
            macOS)
              cp target/release/libgodot_onnx.dylib sample/addons/godot-onnx/ 2>/dev/null || true
              ;;
          esac
          ls -la sample/addons/godot-onnx/

      - name: Upload sample project (with extension)
        uses: actions/upload-artifact@v4
        with:
          name: godot-onnx-sample-${{ matrix.os }}
          path: sample/
          if-no-files-found: error

  merge-sample:
    name: Merge sample (all platforms)
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: godot-onnx-sample-Windows
          path: art-windows

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: godot-onnx-sample-Linux
          path: art-linux

      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: godot-onnx-sample-macOS
          path: art-macos

      - name: Merge into one sample project
        run: |
          mkdir -p merged/sample/addons/godot-onnx
          cp -r art-linux/* merged/sample/
          cp art-windows/addons/godot-onnx/libgodot_onnx.dll merged/sample/addons/godot-onnx/ 2>/dev/null || true
          cp art-macos/addons/godot-onnx/libgodot_onnx.dylib merged/sample/addons/godot-onnx/ 2>/dev/null || true
          ls -la merged/sample/addons/godot-onnx/

      - name: Upload merged sample project
        uses: actions/upload-artifact@v4
        with:
          name: godot-onnx-sample
          path: merged/sample/
          if-no-files-found: error
