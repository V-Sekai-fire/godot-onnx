# Install Dawn from official release (no build).
# https://github.com/google/dawn/releases/tag/v20260219.200501
# Produces dawn-linux-x64 and dawn-windows-x64 artifacts for use with ONNX Runtime WebGPU.
name: Install Dawn

on:
  workflow_dispatch: {}
  push:
    branches: [main, master]
    paths:
      - '.github/workflows/build-dawn.yml'

env:
  DAWN_RELEASE_TAG: v20260219.200501
  DAWN_COMMIT: 536c572abab2602db0b652eda401ebd01e046c11

jobs:
  dawn-linux:
    name: Dawn Linux (release)
    runs-on: ubuntu-latest
    steps:
      - name: Download Dawn (ubuntu-latest Release)
        run: |
          ASSET="Dawn-${{ env.DAWN_COMMIT }}-ubuntu-latest-Release.tar.gz"
          curl -sL -o dawn.tar.gz \
            "https://github.com/google/dawn/releases/download/${{ env.DAWN_RELEASE_TAG }}/${ASSET}"

      - name: Install Dawn
        run: |
          mkdir -p dawn-install
          tar -xzf dawn.tar.gz -C dawn-install
          ls -laR dawn-install/

      - name: Upload Dawn artifact
        uses: actions/upload-artifact@v4
        with:
          name: dawn-linux-x64
          path: dawn-install/

  dawn-windows:
    name: Dawn Windows (release)
    runs-on: windows-latest
    steps:
      - name: Download Dawn (windows-latest Release)
        run: |
          $asset = "Dawn-$env:DAWN_COMMIT-windows-latest-Release.tar.gz"
          Invoke-WebRequest -Uri "https://github.com/google/dawn/releases/download/$env:DAWN_RELEASE_TAG/$asset" `
            -OutFile dawn.tar.gz -UseBasicParsing

      - name: Install Dawn
        run: |
          New-Item -ItemType Directory -Force -Path dawn-install | Out-Null
          tar -xzf dawn.tar.gz -C dawn-install
          Get-ChildItem dawn-install -Recurse | Select-Object -First 20

      - name: Upload Dawn artifact
        uses: actions/upload-artifact@v4
        with:
          name: dawn-windows-x64
          path: dawn-install/
