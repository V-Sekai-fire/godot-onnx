# Install Dawn from official release for all platforms ort/ort-web support.
# https://github.com/google/dawn/releases/tag/v20260219.200501
# Artifacts: dawn-linux-x64, dawn-windows-x64, dawn-macos-x64, dawn-android, dawn-apple-ios, dawn-web.
name: Install Dawn

on:
  workflow_dispatch: {}
  push:
    branches: [main, master]
    paths:
      - '.github/workflows/build-dawn.yml'

env:
  DAWN_RELEASE_TAG: v20260219.200501
  DAWN_COMMIT: 536c572abab2602db0b652eda401ebd01e046c11

jobs:
  dawn-linux:
    name: Dawn Linux
    runs-on: ubuntu-latest
    steps:
      - name: Download Dawn (ubuntu-latest Release)
        run: |
          ASSET="Dawn-${{ env.DAWN_COMMIT }}-ubuntu-latest-Release.tar.gz"
          curl -sL -o dawn.tar.gz "https://github.com/google/dawn/releases/download/${{ env.DAWN_RELEASE_TAG }}/${ASSET}"
      - name: Install Dawn
        run: |
          mkdir -p dawn-install
          tar -xzf dawn.tar.gz -C dawn-install
          ls -laR dawn-install/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dawn-linux-x64
          path: dawn-install/

  dawn-windows:
    name: Dawn Windows
    runs-on: windows-latest
    steps:
      - name: Download Dawn (windows-latest Release)
        run: |
          $asset = "Dawn-$env:DAWN_COMMIT-windows-latest-Release.tar.gz"
          Invoke-WebRequest -Uri "https://github.com/google/dawn/releases/download/$env:DAWN_RELEASE_TAG/$asset" -OutFile dawn.tar.gz -UseBasicParsing
      - name: Install Dawn
        run: |
          New-Item -ItemType Directory -Force -Path dawn-install | Out-Null
          tar -xzf dawn.tar.gz -C dawn-install
          Get-ChildItem dawn-install -Recurse | Select-Object -First 25
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dawn-windows-x64
          path: dawn-install/

  dawn-macos:
    name: Dawn macOS
    runs-on: macos-latest
    steps:
      - name: Download Dawn (macos-latest Release)
        run: |
          ASSET="Dawn-${{ env.DAWN_COMMIT }}-macos-latest-Release.tar.gz"
          curl -sL -o dawn.tar.gz "https://github.com/google/dawn/releases/download/${{ env.DAWN_RELEASE_TAG }}/${ASSET}"
      - name: Install Dawn
        run: |
          mkdir -p dawn-install
          tar -xzf dawn.tar.gz -C dawn-install
          ls -laR dawn-install/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dawn-macos-x64
          path: dawn-install/

  dawn-android:
    name: Dawn Android
    runs-on: ubuntu-latest
    steps:
      - name: Download Dawn (Android)
        run: |
          ASSET="dawn-android-${{ env.DAWN_COMMIT }}.tar.gz"
          curl -sL -o dawn.tar.gz "https://github.com/google/dawn/releases/download/${{ env.DAWN_RELEASE_TAG }}/${ASSET}"
      - name: Install Dawn
        run: |
          mkdir -p dawn-install
          tar -xzf dawn.tar.gz -C dawn-install
          ls -laR dawn-install/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dawn-android
          path: dawn-install/

  dawn-apple-ios:
    name: Dawn Apple (iOS xcframework)
    runs-on: ubuntu-latest
    steps:
      - name: Download Dawn (Apple xcframework)
        run: |
          ASSET="dawn-apple-${{ env.DAWN_COMMIT }}.xcframework.tar.gz"
          curl -sL -o dawn.tar.gz "https://github.com/google/dawn/releases/download/${{ env.DAWN_RELEASE_TAG }}/${ASSET}"
      - name: Install Dawn
        run: |
          mkdir -p dawn-install
          tar -xzf dawn.tar.gz -C dawn-install
          ls -laR dawn-install/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dawn-apple-ios
          path: dawn-install/

  dawn-web:
    name: Dawn Web (emdawnwebgpu)
    runs-on: ubuntu-latest
    steps:
      - name: Download emdawnwebgpu package
        run: |
          curl -sL -o emdawnwebgpu.zip "https://github.com/google/dawn/releases/download/${{ env.DAWN_RELEASE_TAG }}/emdawnwebgpu_pkg-${{ env.DAWN_RELEASE_TAG }}.zip"
      - name: Install Dawn (web)
        run: |
          mkdir -p dawn-install
          unzip -q emdawnwebgpu.zip -d dawn-install
          ls -laR dawn-install/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dawn-web
          path: dawn-install/
